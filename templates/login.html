{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Sign in</h2>
    <p class="muted">Secure access to your Smart Payment Reminder workspace.</p>

    <!-- ✅ Google Login Button -->
    <a href="{{ url_for('google_login') }}" class="btn-google">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </a>

    <!-- ✅ Divider -->
    <div class="divider">or sign in with email</div>

    <!-- ✅ Email Login Form -->
    <form method="POST" autocomplete="on">

      <label>Email</label>
      <input
        type="email"
        name="email"
        required
        placeholder="Enter your email"
        autocomplete="email"
      >

      <label>Password</label>
      <div class="password-wrap">
        <input
          id="password"
          type="password"
          name="password"
          required
          placeholder="Enter password"
          autocomplete="current-password"
        >

        <!-- ✅ Redesigned SVG Eye Button -->
        <button
          type="button"
          class="eye-btn"
          onclick="togglePassword()"
          aria-label="Show or hide password"
          title="Show/Hide Password"
        >
          <svg id="eyeShow" xmlns="http://www.w3.org/2000/svg"
               width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M2 12C4.5 7 8 4.5 12 4.5C16 4.5 19.5 7 22 12C19.5 17 16 19.5 12 19.5C8 19.5 4.5 17 2 12Z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg id="eyeHide" xmlns="http://www.w3.org/2000/svg"
               width="20" height="20" viewBox="0 0 24 24" fill="none"
               style="display:none;">
            <path d="M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10.5 10.5C10.18 10.82 9.98 11.28 9.98 11.78C9.98 12.9 10.88 13.8 12 13.8C12.5 13.8 12.96 13.6 13.28 13.28"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6.5 6.5C4.5 7.9 3 9.8 2 12C4.5 17 8 19.5 12 19.5C13.8 19.5 15.5 19 17 18.1"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9.5 4.7C10.3 4.57 11.14 4.5 12 4.5C16 4.5 19.5 7 22 12C21.3 13.5 20.4 14.8 19.4 15.8"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <!-- ✅ Forgot password -->
      <div class="auth-footer" style="justify-content:flex-end; margin-top:0;">
        <a href="{{ url_for('forgot_password') }}" style="font-weight:900;">
          Forgot password?
        </a>
      </div>

      <button type="submit">Login</button>
    </form>

    <div class="auth-footer">
      <span>New here?</span>
      <a href="{{ url_for('register') }}">Create account</a>
    </div>
  </div>
</div>

<script>
function togglePassword(){
  const input = document.getElementById("password");
  const show = document.getElementById("eyeShow");
  const hide = document.getElementById("eyeHide");

  if(input.type === "password"){
    input.type = "text";
    show.style.display = "none";
    hide.style.display = "inline";
  } else {
    input.type = "password";
    show.style.display = "inline";
    hide.style.display = "none";
  }
}
</script>
{% endblock %}
