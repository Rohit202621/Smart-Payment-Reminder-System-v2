{% extends "base.html" %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <h2>Change Password</h2>
    
    <form id="cpForm" method="POST" autocomplete="off">

      <label>New Password</label>
      <div class="password-wrap">
        <input id="newpass" type="password" name="password"
               required minlength="4" placeholder="Enter new password"
               autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePass('newpass','eyeN','slashN')">
          <svg id="eyeN" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 12C4.5 7 8 4.5 12 4.5C16 4.5 19.5 7 22 12C19.5 17 16 19.5 12 19.5C8 19.5 4.5 17 2 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
          <svg id="slashN" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
            <path d="M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6.5 6.5C4.5 7.9 3 9.8 2 12C4.5 17 8 19.5 12 19.5C13.8 19.5 15.5 19 17 18.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9.5 4.7C10.3 4.57 11.14 4.5 12 4.5C16 4.5 19.5 7 22 12C21.3 13.5 20.4 14.8 19.4 15.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <label>Confirm Password</label>
      <div class="password-wrap">
        <input id="confpass" type="password" name="confirm_password"
               required minlength="4" placeholder="Confirm new password"
               autocomplete="new-password">
        <button type="button" class="eye-btn" onclick="togglePass('confpass','eyeC','slashC')">
          <svg id="eyeC" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 12C4.5 7 8 4.5 12 4.5C16 4.5 19.5 7 22 12C19.5 17 16 19.5 12 19.5C8 19.5 4.5 17 2 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
          </svg>
          <svg id="slashC" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none;">
            <path d="M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6.5 6.5C4.5 7.9 3 9.8 2 12C4.5 17 8 19.5 12 19.5C13.8 19.5 15.5 19 17 18.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9.5 4.7C10.3 4.57 11.14 4.5 12 4.5C16 4.5 19.5 7 22 12C21.3 13.5 20.4 14.8 19.4 15.8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div id="matchBox" class="alert alert-danger" style="display:none; margin-top:8px;">
        ❌ Passwords do not match
      </div>

      <button id="submitBtn" type="submit">Update Password</button>
    </form>

    <div class="auth-footer" style="margin-top:18px;">
      <a href="{{ url_for('profile') }}">← Back to Profile</a>
    </div>

  </div>
</div>

<script>
function togglePass(inputId, eyeId, slashId){
  const input = document.getElementById(inputId);
  if(input.type==="password"){ input.type="text"; document.getElementById(eyeId).style.display="none"; document.getElementById(slashId).style.display="inline"; }
  else { input.type="password"; document.getElementById(eyeId).style.display="inline"; document.getElementById(slashId).style.display="none"; }
}
document.addEventListener("DOMContentLoaded",()=>{
  const np=document.getElementById("newpass"), cp=document.getElementById("confpass");
  const mb=document.getElementById("matchBox"), sb=document.getElementById("submitBtn");
  function check(){ if(np.value&&cp.value&&np.value!==cp.value){ mb.style.display="block"; sb.disabled=true; } else { mb.style.display="none"; sb.disabled=false; } }
  np.addEventListener("input",check); cp.addEventListener("input",check);
});
</script>
{% endblock %}
