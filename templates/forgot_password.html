{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <h2>Forgot Password</h2>

    <p class="muted">
      Enter your registered <b>Email</b>.
      We will send an OTP to reset your password.
    </p>

    <!-- ✅ OTP Request Form - Email Only -->
    <form method="POST" autocomplete="on">

      <label>Email</label>
      <input
        id="email"
        type="email"
        name="email"
        required
        maxlength="80"
        placeholder="Eg: rohit@gmail.com"
        value="{{ prefill or '' }}"
        autocomplete="email"
        autofocus
      >

      <p class="muted" style="margin:-6px 0 12px 0;">
        OTP will be valid for <b>5 minutes</b>.
      </p>

      <button type="submit">Send OTP</button>
    </form>

    <div class="auth-footer" style="margin-top:18px;">
      <a href="{{ url_for('login') }}">← Back to Login</a>
    </div>

  </div>
</div>
{% endblock %}
