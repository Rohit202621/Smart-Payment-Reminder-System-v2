{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <h2>Reset Password</h2>
    <p class="muted">
      OTP verified ✅ Now create your new password to login again.
    </p>

    <form id="resetForm" method="POST" autocomplete="off">

      <label>New Password</label>
      <div class="password-wrap">
        <input
          id="newpass"
          type="password"
          name="password"
          required
          minlength="4"
          maxlength="50"
          placeholder="Enter new password"
          autocomplete="new-password"
          aria-label="New password"
          autofocus
        >

        <button
          type="button"
          class="eye-btn"
          onclick="togglePass('newpass', 'eyeIconNew', 'eyeSlashNew')"
          aria-label="Show or hide password"
          title="Show/Hide Password"
        >
          <svg id="eyeIconNew" xmlns="http://www.w3.org/2000/svg"
               width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M2 12C4.5 7 8 4.5 12 4.5C16 4.5 19.5 7 22 12C19.5 17 16 19.5 12 19.5C8 19.5 4.5 17 2 12Z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg id="eyeSlashNew" xmlns="http://www.w3.org/2000/svg"
               width="20" height="20" viewBox="0 0 24 24" fill="none"
               style="display:none;">
            <path d="M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10.5 10.5C10.18 10.82 9.98 11.28 9.98 11.78C9.98 12.9 10.88 13.8 12 13.8C12.5 13.8 12.96 13.6 13.28 13.28"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6.5 6.5C4.5 7.9 3 9.8 2 12C4.5 17 8 19.5 12 19.5C13.8 19.5 15.5 19 17 18.1"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9.5 4.7C10.3 4.57 11.14 4.5 12 4.5C16 4.5 19.5 7 22 12C21.3 13.5 20.4 14.8 19.4 15.8"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <p class="muted" style="margin:-6px 0 12px 0;">
        Tip: Use at least 6 characters for better security.
      </p>

      <label>Confirm Password</label>
      <div class="password-wrap">
        <input
          id="confpass"
          type="password"
          name="confirm_password"
          required
          minlength="4"
          maxlength="50"
          placeholder="Confirm new password"
          autocomplete="new-password"
          aria-label="Confirm password"
        >

        <button
          type="button"
          class="eye-btn"
          onclick="togglePass('confpass', 'eyeIconConfirm', 'eyeSlashConfirm')"
          aria-label="Show or hide password"
          title="Show/Hide Password"
        >
          <svg id="eyeIconConfirm" xmlns="http://www.w3.org/2000/svg"
               width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M2 12C4.5 7 8 4.5 12 4.5C16 4.5 19.5 7 22 12C19.5 17 16 19.5 12 19.5C8 19.5 4.5 17 2 12Z"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <svg id="eyeSlashConfirm" xmlns="http://www.w3.org/2000/svg"
               width="20" height="20" viewBox="0 0 24 24" fill="none"
               style="display:none;">
            <path d="M3 3L21 21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M10.5 10.5C10.18 10.82 9.98 11.28 9.98 11.78C9.98 12.9 10.88 13.8 12 13.8C12.5 13.8 12.96 13.6 13.28 13.28"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6.5 6.5C4.5 7.9 3 9.8 2 12C4.5 17 8 19.5 12 19.5C13.8 19.5 15.5 19 17 18.1"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9.5 4.7C10.3 4.57 11.14 4.5 12 4.5C16 4.5 19.5 7 22 12C21.3 13.5 20.4 14.8 19.4 15.8"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div id="matchBox" class="alert alert-danger" style="display:none; margin-top:10px;">
        ❌ Passwords do not match
      </div>

      <button id="submitBtn" type="submit">Update Password</button>
    </form>

    <div class="auth-footer" style="margin-top:18px;">
      <a href="{{ url_for('login') }}">← Back to Login</a>
    </div>

  </div>
</div>

<script>
function togglePass(inputId, eyeId, slashId){
  const input = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  const slash = document.getElementById(slashId);
  if(!input) return;
  if(input.type === "password"){
    input.type = "text";
    if(eye) eye.style.display = "none";
    if(slash) slash.style.display = "inline";
  }else{
    input.type = "password";
    if(eye) eye.style.display = "inline";
    if(slash) slash.style.display = "none";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("resetForm");
  const newPass = document.getElementById("newpass");
  const confPass = document.getElementById("confpass");
  const matchBox = document.getElementById("matchBox");
  const submitBtn = document.getElementById("submitBtn");

  function checkMatch(){
    if(!newPass.value || !confPass.value){
      matchBox.style.display = "none";
      submitBtn.disabled = false;
      return true;
    }
    if(newPass.value !== confPass.value){
      matchBox.style.display = "block";
      submitBtn.disabled = true;
      return false;
    }
    matchBox.style.display = "none";
    submitBtn.disabled = false;
    return true;
  }

  newPass.addEventListener("input", checkMatch);
  confPass.addEventListener("input", checkMatch);

  form.addEventListener("submit", (e) => {
    if(!checkMatch()){
      e.preventDefault();
      alert("❌ Passwords do not match!");
    }
  });

  checkMatch();
});
</script>
{% endblock %}
